
name: Deploy Databricks App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  APP_NAME: data-explorer
  WORKSPACE_DIR: /Workspace/Apps/data-explorer

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify files after checkout
        run: |
          echo "📂 Current directory:"
          pwd
          echo ""
          echo "📋 Files in repository:"
          ls -la
          echo ""
          echo "📋 Files in static directory:"
          ls -la static/ || echo "static/ directory not found"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate Python syntax
        run: |
          python -m compileall app.py
      
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          echo "$HOME/.databricks/bin" >> "$GITHUB_PATH"
          databricks --version
      
      - name: Upload files to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "❌ Missing required secrets: DATABRICKS_HOST and/or DATABRICKS_TOKEN"
            exit 1
          fi

          echo "📦 Uploading app files to Databricks workspace..."

          # Reset workspace path to avoid file/folder type conflicts from prior imports
          databricks workspace delete "$WORKSPACE_DIR" --recursive || true
          databricks workspace mkdirs "$WORKSPACE_DIR"
          databricks workspace mkdirs "$WORKSPACE_DIR/static"

          # Use RAW format so plain files are uploaded as workspace files (not notebook/source archives)
          
          databricks workspace import "$WORKSPACE_DIR/app.py" --file app.py --format RAW
          databricks workspace import "$WORKSPACE_DIR/app.yaml" --file app.yaml --format RAW
          databricks workspace import "$WORKSPACE_DIR/requirements.txt" --file requirements.txt --format RAW
          databricks workspace import "$WORKSPACE_DIR/README.md" --file README.md --format RAW
          
          # Upload static files
          databricks workspace import "$WORKSPACE_DIR/static/index.html" --file static/index.html --format RAW
          databricks workspace import "$WORKSPACE_DIR/static/style.css" --file static/style.css --format RAW
          databricks workspace import "$WORKSPACE_DIR/static/app.js" --file static/app.js --format RAW
          
          echo "✅ All files uploaded successfully!"
      
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "🎉 DEPLOYMENT SUCCESSFUL"
          echo "============================================"
          echo ""
          echo "📍 Files uploaded to: $WORKSPACE_DIR"
          echo ""
          echo "📋 Next steps (first time only):"
          echo "   1. Go to Databricks workspace"
          echo "   2. Navigate to 'Apps'"
          echo "   3. Click 'Create App'"
          echo "   4. Source: 'From workspace files'"
          echo "   5. Path: $WORKSPACE_DIR"
          echo "   6. Name: $APP_NAME"
          echo "   7. Click 'Create'"
          echo ""
          echo "🔄 After initial setup:"
          echo "   Every push to main will auto-update the files!"
          echo ""
          echo "============================================"
