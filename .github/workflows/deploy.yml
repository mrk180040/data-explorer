name: Deploy Databricks App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  APP_NAME: data-explorer
  WORKSPACE_DIR: /Workspace/Apps/data-explorer

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      
      - name: Upload files to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Configure Databricks CLI
          databricks configure --host "$DATABRICKS_HOST" --token
          
          # Create workspace directory
          databricks workspace mkdirs "$WORKSPACE_DIR" || true
          
          # Upload all files
          echo "📦 Uploading app files to Databricks workspace..."
          
          # Upload main files
          databricks workspace import app.py "$WORKSPACE_DIR/app.py" --language PYTHON --overwrite
          databricks workspace import app.yaml "$WORKSPACE_DIR/app.yaml" --overwrite
          databricks workspace import requirements.txt "$WORKSPACE_DIR/requirements.txt" --overwrite
          databricks workspace import README.md "$WORKSPACE_DIR/README.md" --overwrite
          
          # Create static directory
          databricks workspace mkdirs "$WORKSPACE_DIR/static" || true
          
          # Upload static files
          databricks workspace import static/index.html "$WORKSPACE_DIR/static/index.html" --language HTML --overwrite
          databricks workspace import static/style.css "$WORKSPACE_DIR/static/style.css" --overwrite
          databricks workspace import static/app.js "$WORKSPACE_DIR/static/app.js" --language JAVASCRIPT --overwrite
          
          echo "✅ All files uploaded successfully!"
      
      - name: App Deployment Instructions
        run: |
          echo "============================================"
          echo "🚀 FILES UPLOADED TO DATABRICKS"
          echo "============================================"
          echo ""
          echo "📍 Location: $WORKSPACE_DIR"
          echo ""
          echo "📋 To create the Databricks App (first time only):"
          echo "   1. Go to Databricks workspace"
          echo "   2. Click 'Apps' in the sidebar"
          echo "   3. Click 'Create App'"
          echo "   4. Choose 'From workspace files'"
          echo "   5. Path: $WORKSPACE_DIR"
          echo "   6. Name: $APP_NAME"
          echo "   7. Click 'Create'"
          echo ""
          echo "✅ After app is created, it will auto-update on every push!"
          echo "============================================"
